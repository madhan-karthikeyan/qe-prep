name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest pytest-benchmark
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy .
      - name: Test (pytest)
        run: pytest -v

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Format check (gofmt)
        run: test -z $(gofmt -d .)
      - name: Vet (go vet)
        run: go vet ./...
      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: go
      - name: Test (go test -race)
        run: go test -race -count=1 ./...
      - name: Benchmark
        run: go test -bench=. -benchmem ./...

  java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Checkstyle
        run: mvn checkstyle:check -q
      - name: SpotBugs
        run: mvn spotbugs:check -q
      - name: Test (JUnit 5)
        run: mvn test -q
